# Manual / auto dispatch to Xposed official repo
name: Trigger Official Repo Sync

on:
  release:
    types: [published]
  push:
    branches:
      - main
    paths:
      - 'README.md'
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch sync event
        env:
          GH_TOKEN: ${{ secrets.SYNC_PAT }}
        run: |
          gh api repos/Xposed-Modules-Repo/org.cf0x.konamiku/dispatches \
            --field event_type=sync-from-upstream \
            --field 'client_payload={"source":"konamiku"}'
          echo "✓ Dispatch sent"
