#  KonamikU — generate .updates/update.json + per-tag changelogs (linked list)
#  Trigger: new Release OR manual workflow_dispatch
#  Tags sorted by commit date.
name: Update Changelog

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag (leave empty to use HEAD)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    if: ${{ !github.event.release.prerelease }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve versions for current HEAD
        id: versions
        run: |
          TAG_INPUT="${{ github.event.inputs.tag }}"
          if [ -n "$TAG_INPUT" ]; then TAG="$TAG_INPUT"
          elif [ "${GITHUB_REF#refs/tags/}" != "${GITHUB_REF}" ]; then TAG="${GITHUB_REF#refs/tags/}"
          else TAG=$(git tag --sort=-creatordate | head -1); fi
          [ -z "$TAG" ] && TAG="HEAD"
          echo "version_code=$TAG"     >> "$GITHUB_OUTPUT"
          echo "version_name=$TAG"     >> "$GITHUB_OUTPUT"
          echo "current_tag=$TAG"      >> "$GITHUB_OUTPUT"

      - name: Generate per-tag changelogs (linked list)
        run: |
          mkdir -p .updates
          REPO="${GITHUB_REPOSITORY}"
          BASE="https://raw.githubusercontent.com/${REPO}/main/.updates"
          TAGS=$(git for-each-ref --sort=committerdate refs/tags --format='%(refname:short)')

          PREV=""
          NEXT=""
          for TAG in $TAGS; do
            if [ -z "$PREV" ]; then
              # First tag
              RANGE="$TAG"
              echo "--- Changelog for $TAG (initial) ---"
            else
              RANGE="${PREV}..${TAG}"
              echo "--- Changelog for $TAG (since $PREV) ---"

              # Update previous tag's file: add next_changelog pointing to this tag
              PREV_NEXT="${BASE}/changelog-${TAG}.json"
              jq ".next_changelog = \"${PREV_NEXT}\"" ".updates/changelog-${PREV}.json" > ".updates/changelog-${PREV}.tmp" && \
                mv ".updates/changelog-${PREV}.tmp" ".updates/changelog-${PREV}.json"
            fi

            # Extract commits
            git log "$RANGE" --reverse --pretty=format:'%H|||%B' 2>/dev/null > /tmp/raw_commits.txt

            # Build JSON array (hash|||full_message)
            while IFS='|||' read -r hash message; do
              TITLE=$(echo "$message" | head -1)
              BODY=$(echo "$message" | tail -n +2)
              TITLE_JSON=$(echo "$TITLE" | jq -Rs '.')
              BODY_JSON=$(echo "$BODY" | jq -Rs '.')
              echo "{\"hash\":$(echo "$hash" | jq -Rs '.'),\"title\":$TITLE_JSON,\"body\":$BODY_JSON}"
            done < /tmp/raw_commits.txt | jq -s '.' > "/tmp/commits_${TAG}.json"

            COUNT=$(cat "/tmp/commits_${TAG}.json" | jq length)
            echo "  $COUNT commit(s)"

            # Previous changelog URL (null for first tag)
            if [ -z "$PREV" ]; then
              PREV_LINK="null"
            else
              PREV_LINK="\"${BASE}/changelog-${PREV}.json\""
            fi

            # Write changelog with previous_changelog
            jq -n \
              --arg vn "$TAG" \
              --arg dt "$(git log -1 --format=%aI "$TAG" | cut -dT -f1)" \
              --argjson prev "$(echo "$PREV_LINK" | jq -r '.')" \
              --argjson commits "$(cat "/tmp/commits_${TAG}.json")" \
              '{
                version_name: $vn,
                date: $dt,
                previous_changelog: ($prev // null),
                next_changelog: null,
                commits: $commits
              }' > ".updates/changelog-${TAG}.json"

            PREV="$TAG"
          done

          echo "Done generating per-tag changelogs."

      - name: Write update.json
        run: |
          TAG="${{ steps.versions.outputs.current_tag }}"
          REPO="${GITHUB_REPOSITORY}"
          jq -n \
            --arg tag "$TAG" \
            --arg repo "${REPO}" \
            '{
              version_code: ($tag | tonumber),
              version_name: $tag,
              download_url: "https://github.com/\($repo)/releases/download/\($tag)/app-release.apk",
              changelog_url: "https://raw.githubusercontent.com/\($repo)/main/.updates/changelog-\($tag).json",
              latest_changelog: "https://raw.githubusercontent.com/\($repo)/main/.updates/changelog-\($tag).json"
            }' > .updates/update.json
          echo "Generated .updates/update.json"

      - name: Commit & push update files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .updates/
          if ! git diff --cached --quiet; then
            git commit -m "chore(updates): auto-generate update info for ${{ steps.versions.outputs.current_tag }}"
            git push
          else
            echo "No changes, skipping commit"
          fi
