#  KonamikU — generate update.json + per-tag changelogs (linked list)
#  Branch: info — files live at root, pushed via orphan branch.
name: Update Changelog

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag (leave empty to use HEAD)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    if: ${{ !github.event.release.prerelease }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve versions
        id: versions
        run: |
          TAG_INPUT="${{ github.event.inputs.tag }}"
          if [ -n "$TAG_INPUT" ]; then TAG="$TAG_INPUT"
          elif [ "${GITHUB_REF#refs/tags/}" != "${GITHUB_REF}" ]; then TAG="${GITHUB_REF#refs/tags/}"
          else TAG=$(git tag --sort=-creatordate | head -1); fi
          [ -z "$TAG" ] && TAG="HEAD"
          echo "version_code=$TAG" >> "$GITHUB_OUTPUT"
          echo "current_tag=$TAG"   >> "$GITHUB_OUTPUT"

      - name: Generate per-tag changelogs
        run: |
          mkdir -p /tmp/_info
          REPO="${GITHUB_REPOSITORY}"
          BASE="https://raw.githubusercontent.com/${REPO}/info"
          TAGS=$(git for-each-ref --sort=committerdate refs/tags --format='%(refname:short)')

          PREV=""
          for TAG in $TAGS; do
            if [ -z "$PREV" ]; then
              RANGE="$TAG"
              echo "--- Changelog for $TAG (initial) ---"
            else
              RANGE="${PREV}..${TAG}"
              echo "--- Changelog for $TAG (since $PREV) ---"
              PREV_NEXT="${BASE}/changelog-${TAG}.json"
              jq ".next_changelog = \"${PREV_NEXT}\"" "/tmp/_info/changelog-${PREV}.json" > "/tmp/_info/changelog-${PREV}.tmp" && \
                mv "/tmp/_info/changelog-${PREV}.tmp" "/tmp/_info/changelog-${PREV}.json"
            fi

            # NUL-delimited commit extraction
            git log "$RANGE" --reverse --format='%H%x00%s%x00%b%x00' 2>/dev/null > "/tmp/raw_${TAG}.txt"
            jq -Rs '
              [split("\u0000") | .[0:-1] | _nwise(3) | {hash: .[0], title: .[1], body: .[2]}]
            ' "/tmp/raw_${TAG}.txt" > "/tmp/commits_${TAG}.json"

            COUNT=$(jq length "/tmp/commits_${TAG}.json")
            echo "  $COUNT commit(s)"

            PREV_LINK=""
            [ -n "$PREV" ] && PREV_LINK="${BASE}/changelog-${PREV}.json"

            jq -n \
              --arg vn "$TAG" \
              --arg dt "$(git log -1 --format=%aI "$TAG" | cut -dT -f1)" \
              --arg prev "$PREV_LINK" \
              --argjson commits "$(cat "/tmp/commits_${TAG}.json")" \
              '{
                version_name: $vn,
                date: $dt,
                previous_changelog: (if $prev == "" then null else $prev end),
                next_changelog: null,
                commits: $commits
              }' > "/tmp/_info/changelog-${TAG}.json"

            PREV="$TAG"
          done
          echo "Done generating per-tag changelogs."

      - name: Write update.json
        run: |
          TAG="${{ steps.versions.outputs.current_tag }}"
          REPO="${GITHUB_REPOSITORY}"
          jq -n \
            --arg tag "$TAG" \
            --arg repo "${REPO}" \
            '{
              version_code: (try ($tag | tonumber) catch 0),
              version_name: $tag,
              download_url: "https://github.com/\($repo)/releases/download/\($tag)/app-release.apk",
              changelog_url: "https://raw.githubusercontent.com/\($repo)/info/changelog-\($tag).json",
              latest_changelog: "https://raw.githubusercontent.com/\($repo)/info/changelog-\($tag).json"
            }' > /tmp/_info/update.json
          echo "Generated /tmp/_info/"

      - name: Push to info branch
        run: |
          TAG="${{ steps.versions.outputs.current_tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout --orphan _info_branch
          git reset --hard
          cp -r /tmp/_info/* .
          rm -f .gitignore

          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "chore: auto-generate update info for ${TAG}"
            git push origin _info_branch:info --force
          else
            echo "No changes, skipping commit"
          fi
