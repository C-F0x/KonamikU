#  KonamikU — generate update.json + per-tag incremental changelogs
#  Trigger: new Release OR manual workflow_dispatch
#  Walks all tags in order and produces one changelog per consecutive pair.
name: Update Changelog

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag (leave empty to use HEAD)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    if: ${{ !github.event.release.prerelease }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve versions for current HEAD
        id: versions
        run: |
          # Tag IS the versionCode (pure number, e.g. "250620")
          TAG_INPUT="${{ github.event.inputs.tag }}"
          if [ -n "$TAG_INPUT" ]; then
            TAG="$TAG_INPUT"
          elif [ "${GITHUB_REF#refs/tags/}" != "${GITHUB_REF}" ]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            # workflow_dispatch without tag → use latest tag
            TAG=$(git tag --sort=-creatordate | head -1)
          fi
          # Last resort fallback
          [ -z "$TAG" ] && TAG="HEAD"
          VERSION_CODE="${TAG}"

          # version_name still from properties for human display
          MAJOR=$(grep 'ver_Major' version.properties | cut -d= -f2 | tr -d ' ')
          MINOR=$(grep 'ver_Minor' version.properties | cut -d= -f2 | tr -d ' ')
          DATE_DOT=$(date -u +%y.%m)
          VERSION_NAME="${DATE_DOT}.${MAJOR}.${MINOR}"

          echo "version_code=$VERSION_CODE"   >> "$GITHUB_OUTPUT"
          echo "version_name=$VERSION_NAME"   >> "$GITHUB_OUTPUT"
          echo "current_tag=$TAG"             >> "$GITHUB_OUTPUT"

      - name: Generate per-tag changelogs
        run: |
          mkdir -p updates
          REPO="${GITHUB_REPOSITORY}"

          # Get all tags sorted chronologically (oldest first)
          TAGS=$(git tag --sort=creatordate)

          PREV=""
          for TAG in $TAGS; do
            if [ -z "$PREV" ]; then
              # First tag: all commits up to it
              RANGE="$TAG"
              PREV_CHANGELOG="null"
              echo "--- Changelog for $TAG (initial) ---"
            else
              RANGE="${PREV}..${TAG}"
              PREV_CHANGELOG="\"https://raw.githubusercontent.com/${REPO}/main/updates/changelog-${PREV}.json\""
              echo "--- Changelog for $TAG (since $PREV) ---"
            fi

            # Extract commits
            git log "$RANGE" --reverse --oneline --pretty=format:'%H||%s||%b' 2>/dev/null > /tmp/raw_commits.txt

            # Build JSON array
            while IFS='||' read -r hash title body; do
              TITLE_JSON=$(echo "$title" | jq -Rs '.')
              BODY_JSON=$(echo "$body" | head -1 | jq -Rs '.')
              echo "{\"hash\":$(echo "$hash" | jq -Rs '.'),\"title\":$TITLE_JSON,\"body\":$BODY_JSON}"
            done < /tmp/raw_commits.txt | jq -s '.' > "/tmp/commits_${TAG}.json"

            COUNT=$(cat "/tmp/commits_${TAG}.json" | jq length)
            echo "  $COUNT commit(s)"

            # Write changelog file with previous_changelog link
            jq -n \
              --arg vn "$TAG" \
              --arg dt "$(git log -1 --format=%aI "$TAG" | cut -dT -f1)" \
              --arg prev "$(echo "$PREV_CHANGELOG" | jq -r '.' 2>/dev/null || echo "")" \
              --argjson commits "$(cat "/tmp/commits_${TAG}.json")" \
              '{
                version_name: $vn,
                date: $dt,
                previous_changelog: (if $prev == "" then null else $prev end),
                commits: $commits
              }' > "updates/changelog-${TAG}.json"

            PREV="$TAG"
          done

          echo "Done generating per-tag changelogs."

      - name: Write update.json
        run: |
          jq -n \
            --arg vc "${{ steps.versions.outputs.version_code }}" \
            --arg vn "${{ steps.versions.outputs.version_name }}" \
            --arg tag "${{ steps.versions.outputs.current_tag }}" \
            --arg repo "${GITHUB_REPOSITORY}" \
            '{
              version_code: ($vc | tonumber),
              version_name: $vn,
              download_url: "https://github.com/\($repo)/releases/download/\($tag)/app-release.apk",
              changelog_url: "https://raw.githubusercontent.com/\($repo)/main/updates/changelog-\($tag).json",
              latest_changelog: "https://raw.githubusercontent.com/\($repo)/main/updates/changelog-\($tag).json"
            }' > updates/update.json
          echo "Generated updates/update.json"

      - name: Commit & push update files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add updates/
          if ! git diff --cached --quiet; then
            git commit -m "chore(updates): auto-generate update info for ${{ steps.versions.outputs.current_tag }}"
            git push
          else
            echo "No changes, skipping commit"
          fi
